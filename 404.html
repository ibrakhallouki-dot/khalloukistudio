<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Page Not Found</title>

    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="style.css">

    <style>
        body{
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#0d0d0d;
            color:#fff;
            font-family:Arial,sans-serif;
            text-align:center;
        }

        .box{
            max-width:600px;
            padding:20px;
        }

        h1{
            font-size:120px;
            margin:0;
        }

        p{
            font-size:20px;
            opacity:.8;
        }

        a{
            display:inline-block;
            margin-top:25px;
            padding:14px 30px;
            background:#ffffff;
            color:#000;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
            transition:.3s;
        }

        a:hover{
            transform:translateY(-3px);
        }
    </style>
</head>

<body>

<div class="box">
    <h1>404</h1>
    <p>The page you are looking for doesn't exist.</p>

    <a href="index.html">
        Back Home
    </a>
</div>

</body>
</html>
